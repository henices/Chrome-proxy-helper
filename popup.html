<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <link href="stylesheets/popup.css" rel="stylesheet">
    <script src="javascripts/jquery-3.6.0.min.js"></script>
    <script src="javascripts/popup.js"></script>
</head>
<body>
    <div class="popup-header">
        <div class="logo">
            <svg viewBox="0 0 16 16"><circle cx="8" cy="8" r="3" fill="none" stroke="#fff" stroke-width="1.5"/><path d="M8 1v3M8 12v3M1 8h3M12 8h3" stroke="#fff" stroke-width="1.5" stroke-linecap="round"/></svg>
        </div>
        <h1 data-i18n-content="title">Proxy Helper</h1>
    </div>
    <ul>
        <li id="pac-data-proxy">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div>
                <span class="text" data-i18n-content="pac_data_set">PAC Script</span>
            </div>
        </li>
        <li id="pac-url-proxy">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></div>
                <span class="text" data-i18n-content="pac_url_set">PAC URL</span>
            </div>
        </li>
        <li id="socks5-proxy">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg></div>
                <span class="text" data-i18n-content="socks_proxy_set">SOCKS Proxy</span>
            </div>
        </li>
        <li id="http-proxy">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg></div>
                <span class="text" data-i18n-content="http_proxy_set">HTTP Proxy</span>
            </div>
        </li>
        <li id="https-proxy">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg></div>
                <span class="text" data-i18n-content="https_proxy_set">HTTPS Proxy</span>
            </div>
        </li>
        <li id="quic-proxy">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg></div>
                <span class="text" data-i18n-content="quic_proxy_set">QUIC Proxy</span>
            </div>
        </li>
        <li id="auto-detect" title="WPAD">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="1"/><path d="M20.2 20.2c2.04-2.03.02-7.36-4.5-11.9-4.54-4.52-9.87-6.54-11.9-4.5-2.04 2.03-.02 7.36 4.5 11.9 4.54 4.52 9.87 6.54 11.9 4.5z"/><path d="M15.7 15.7c4.52-4.54 6.54-9.87 4.5-11.9-2.03-2.04-7.36-.02-11.9 4.5-4.52 4.54-6.54 9.87-4.5 11.9 2.03 2.04 7.36.02 11.9-4.5z"/></svg></div>
                <span class="text" data-i18n-content="auto_detect_set">Auto Detect</span>
            </div>
        </li>
        <hr>
        <li id="sys-proxy" title="Use system proxy">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
                <span class="text" data-i18n-content="system_proxy">System</span>
            </div>
        </li>
        <li id="direct-proxy" title="No proxy">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="4.93" y1="4.93" x2="19.07" y2="19.07"/></svg></div>
                <span class="text" data-i18n-content="direct_proxy">Direct</span>
            </div>
        </li>
        <hr>
        <li id="config-proxy">
            <div class="menu">
                <div class="icon"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></div>
                <span class="text" data-i18n-content="config_proxy">Settings</span>
            </div>
        </li>
    </ul>
</body>
</html>
